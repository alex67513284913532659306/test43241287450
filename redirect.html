<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Happ — импорт конфигурации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, rgba(10, 45, 38, 1) 0%, rgba(5, 25, 22, 1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* декоративные элементы */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(135deg, rgba(42, 157, 143, 0.3) 0%, rgba(72, 201, 176, 0.1) 100%);
            filter: blur(60px);
            pointer-events: none;
        }

        .glass-card {
            background: rgba(20, 30, 28, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(72, 201, 176, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(72, 201, 176, 0.1) inset;
            max-width: 540px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .content {
            padding: 2rem 1.8rem 2.2rem;
        }

        .icon-badge {
            background: linear-gradient(145deg, #2a9d8f, #1e6b5e);
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }

        .icon-badge span {
            font-size: 42px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 30%, #a8e6cf 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .sub {
            color: #9ab3a8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(72, 201, 176, 0.3);
            display: inline-block;
            padding-bottom: 0.25rem;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 28px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            border-left: 3px solid #2a9d8f;
            text-align: left;
        }

        .info-panel p {
            font-size: 0.85rem;
            color: #cfe6df;
            word-break: break-all;
            font-family: 'SF Mono', monospace;
        }

        .link-preview {
            background: #0a1916;
            border-radius: 24px;
            padding: 0.8rem 1rem;
            margin: 1rem 0;
            font-size: 0.7rem;
            font-family: monospace;
            color: #9bd9cb;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid rgba(72, 201, 176, 0.3);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 28px 0 20px;
        }

        .btn {
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(4px);
            color: white;
            border: 0.5px solid rgba(255,255,255,0.15);
        }

        .btn-primary {
            background: linear-gradient(100deg, #2a9d8f, #48c9b0);
            box-shadow: 0 8px 20px -8px rgba(42, 157, 143, 0.5);
            border: none;
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px -4px #2a9d8f;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 0.5px solid rgba(72, 201, 176, 0.5);
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(0.98);
        }

        .status {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 60px;
            padding: 10px 16px;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 12px;
            backdrop-filter: blur(4px);
        }

        .loader {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(72, 201, 176, 0.3);
            border-top-color: #48c9b0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #6b8b80;
            border-top: 0.5px solid rgba(72, 201, 176, 0.2);
            padding-top: 1rem;
        }

        a {
            color: #a8e6cf;
            text-decoration: none;
        }

        button:focus-visible {
            outline: 2px solid #48c9b0;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="content">
        <div class="icon-badge">
            <span>🌿</span>
        </div>
        <h1>Happ</h1>
        <div style="margin-bottom: 0.2rem;"><span class="sub">быстрый импорт</span></div>

        <div id="loadingView" style="text-align: center;">
            <div class="loader"></div>
            <p style="margin-top: 12px; color: #9ab3a8;">Анализируем ссылку...</p>
        </div>

        <div id="mainView" style="display: none;">
            <div class="info-panel">
                <strong>📦 Тип:</strong> <span id="fileTypeLabel"></span><br>
                <span id="fileHintText" style="font-size: 0.8rem;"></span>
                <div class="link-preview" id="previewLink"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="importServerBtn">
                    ✨ Добавить сервер в Happ
                </button>
                <button class="btn btn-primary" id="importRoutingBtn" style="background: linear-gradient(95deg, #218277, #3ab396);">
                    🧭 Импортировать маршрутизацию
                </button>
                <button class="btn btn-secondary" id="copyServerLinkBtn">
                    📋 Копировать ссылку сервера
                </button>
                <button class="btn btn-secondary" id="copyRoutingLinkBtn">
                    📄 Копировать ссылку правил
                </button>
            </div>

            <div class="status" id="statusMsg">
                💡 Нажмите кнопку — Happ откроется автоматически
            </div>
        </div>

        <div class="footer-note">
            Поддерживаются VLESS-ссылки, подписки и правила маршрутизации (JSON Base64)<br>
            <span style="font-size: 0.65rem;">Схемы: happ://add/… , happ://routing/add/…</span>
        </div>
    </div>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || urlParams.get('sub') || urlParams.get('config') || urlParams.get('rules');
        
        // если передана готовая схема — ничего не делаем, просто показываем
        if (!targetUrl && window.location.href.includes('happ://')) {
            document.getElementById('loadingView').innerHTML = `
                <div style="background:#2a9d8f20; border-radius: 32px; padding: 1rem;">
                    <span style="font-size: 2rem;">✅</span>
                    <p style="margin-top: 8px;">Happ уже обрабатывает ссылку</p>
                    <p style="font-size: 0.75rem;">Если приложение не открылось, нажмите «Открыть в Happ»</p>
                </div>
            `;
            return;
        }

        if (!targetUrl) {
            document.getElementById('loadingView').innerHTML = `
                <div style="background:#ffaa8810; border-radius: 32px; padding: 1rem;">
                    <span style="font-size: 2rem;">⚠️</span>
                    <p style="margin-top: 8px;">Не указана ссылка для импорта</p>
                    <p style="font-size: 0.7rem;">Используйте параметр ?url=https://...</p>
                    <button class="btn btn-secondary" style="margin-top: 16px; padding: 10px 20px;" onclick="history.back()">Назад</button>
                </div>
            `;
            return;
        }

        // Определяем тип
        let type = 'server';
        let fileHint = 'VLESS / VMess / Trojan ссылка';
        const lower = targetUrl.toLowerCase();

        if (lower.includes('routing') || lower.includes('rules') || lower.includes('route')) {
            type = 'routing';
            fileHint = 'Правила маршрутизации (будет импортировано в Happ)';
        } else if (lower.includes('sub') || lower.includes('subscription')) {
            type = 'sub';
            fileHint = 'Подписка (список серверов)';
        } else if (targetUrl.startsWith('vless://') || targetUrl.startsWith('vmess://') || targetUrl.startsWith('trojan://')) {
            type = 'server';
            fileHint = 'Одиночный протокол — будет добавлен как сервер';
        }

        document.getElementById('fileTypeLabel').innerText = type === 'routing' ? '🧩 Правила маршрутизации' : (type === 'sub' ? '📡 Подписка' : '🔗 Сервер / конфигурация');
        document.getElementById('fileHintText').innerText = fileHint;
        document.getElementById('previewLink').innerText = targetUrl.length > 90 ? targetUrl.slice(0, 90) + '…' : targetUrl;

        // Генерируем схемы Happ
        let serverHappUrl = '';
        let routingHappUrl = '';

        if (type === 'routing') {
            // для правил пробуем напрямую как routing/add
            routingHappUrl = `happ://routing/add/${encodeURIComponent(targetUrl)}`;
            serverHappUrl = `happ://add/${encodeURIComponent(targetUrl)}`; // fallback
        } else {
            // для подписки или одиночной ссылки — добавление сервера
            serverHappUrl = `happ://add/${encodeURIComponent(targetUrl)}`;
            // если это JSON-файл с правилами, можно предложить и routing
            if (lower.endsWith('.json') && (lower.includes('routing') || lower.includes('rules'))) {
                routingHappUrl = `happ://routing/add/${encodeURIComponent(targetUrl)}`;
            } else {
                routingHappUrl = '';
            }
        }

        // Кнопки
        const importServerBtn = document.getElementById('importServerBtn');
        const importRoutingBtn = document.getElementById('importRoutingBtn');
        const copyServerLinkBtn = document.getElementById('copyServerLinkBtn');
        const copyRoutingLinkBtn = document.getElementById('copyRoutingLinkBtn');
        const statusDiv = document.getElementById('statusMsg');

        function openHapp(url, successMsg) {
            if (!url) {
                statusDiv.innerHTML = '⚠️ Не удалось сформировать ссылку для этого типа';
                return;
            }
            window.location.href = url;
            statusDiv.innerHTML = successMsg + '<br>🔄 Если приложение не открылось, проверьте установку Happ';
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('Если приложение')) {
                    statusDiv.innerHTML = '💡 Нажмите кнопку ещё раз или скопируйте ссылку вручную';
                }
            }, 2500);
        }

        function copyToClipboard(text, msg) {
            if (!text) {
                statusDiv.innerHTML = '❌ Нет ссылки для копирования';
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                statusDiv.innerHTML = msg;
                setTimeout(() => {
                    if (statusDiv.innerHTML === msg) statusDiv.innerHTML = '💡 Готово!';
                }, 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                statusDiv.innerHTML = msg;
            });
        }

        importServerBtn.onclick = () => openHapp(serverHappUrl, '✅ Открываем Happ и добавляем сервер...');
        importRoutingBtn.onclick = () => openHapp(routingHappUrl || serverHappUrl, '🧭 Импортируем маршрутизацию...');
        copyServerLinkBtn.onclick = () => copyToClipboard(serverHappUrl, '📋 Ссылка на сервер скопирована!');
        copyRoutingLinkBtn.onclick = () => copyToClipboard(routingHappUrl || serverHappUrl, '📋 Ссылка на правила скопирована!');

        if (!routingHappUrl) {
            importRoutingBtn.style.opacity = '0.6';
            importRoutingBtn.style.pointerEvents = 'none';
            importRoutingBtn.title = 'Для этого файла не определены правила маршрутизации';
        }

        // Показываем интерфейс
        document.getElementById('loadingView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';

        // небольшая авто-попытка для сервера, если это удобно (через 0.5 сек)
        setTimeout(() => {
            if (serverHappUrl && !window.location.href.includes('happ://')) {
                // не авторедирект, но даём пользователю кнопки
            }
        }, 500);
    })();
</script>
</body>
</html>
