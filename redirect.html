<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Импорт в v2rayTun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 16px;
        }
        .container {
            text-align: center;
            padding: 2rem 1.5rem;
            background: rgba(255,255,255,0.08);
            border-radius: 32px;
            backdrop-filter: blur(12px);
            max-width: 90%;
            width: 480px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            opacity: 0.8;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .loading {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .info-box {
            background: rgba(0,0,0,0.35);
            padding: 14px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 13px;
            word-break: break-all;
            text-align: left;
            border-left: 3px solid #7c3aed;
        }
        .btn {
            background: linear-gradient(95deg, #7c3aed, #a855f7);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 280px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            margin-top: 8px;
        }
        .link-area {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0 8px;
            font-size: 11px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            text-align: center;
        }
        .link-area a {
            color: #c084fc;
            text-decoration: none;
        }
        .status {
            font-size: 14px;
            margin-top: 16px;
            padding: 8px;
            border-radius: 40px;
            background: rgba(0,0,0,0.3);
        }
        .footer {
            font-size: 11px;
            margin-top: 24px;
            opacity: 0.6;
        }
        code {
            background: rgba(0,0,0,0.4);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="icon">📲</div>
        <h2>v2rayTun</h2>
        <div class="subtitle">Импорт конфигурации</div>
        
        <div id="loadingArea">
            <div class="loading"></div>
            <p>Подготовка к импорту...</p>
        </div>
        
        <div id="infoArea" style="display: none;">
            <div class="info-box" id="fileTypeBox">
                📄 <strong id="fileType">Файл конфигурации</strong><br>
                <span id="fileHint"></span>
            </div>
            
            <button class="btn" id="importBtn">🔗 Импортировать в v2rayTun</button>
            <button class="btn btn-secondary" id="copyBtn">📋 Скопировать ссылку</button>
            
            <div class="link-area">
                📎 <strong>Прямая ссылка</strong><br>
                <a id="directLink" href="#" target="_blank"></a>
            </div>
            
            <div class="status" id="statusMsg">
                💡 Нажмите кнопку выше, чтобы открыть в приложении
            </div>
        </div>
        
        <div class="footer">
            Поддерживаются подписки, одиночные конфиги и правила маршрутизации
        </div>
    </div>

    <script>
        // Парсим URL параметры
        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || urlParams.get('sub') || urlParams.get('config') || urlParams.get('rules');
        
        // Если ссылки нет в параметрах, пробуем взять из hash (для старых форматов)
        if (!targetUrl && window.location.hash) {
            const hashClean = window.location.hash.substring(1);
            if (hashClean.startsWith('http')) targetUrl = hashClean;
        }
        
        // Если всё ещё нет — показываем ошибку
        if (!targetUrl) {
            document.getElementById('loadingArea').innerHTML = `
                <div style="color:#ffaa88;">⚠️</div>
                <p>Не указана ссылка для импорта</p>
                <p style="font-size:12px;">Используйте: <code>?url=https://...</code></p>
                <button class="btn" onclick="history.back()">Назад</button>
            `;
        } else {
            // Определяем тип контента по расширению или названию
            let fileType = 'config';
            let fileHint = 'Стандартная конфигурация';
            const lowerUrl = targetUrl.toLowerCase();
            
            if (lowerUrl.includes('routing') || lowerUrl.includes('rules') || lowerUrl.includes('route')) {
                fileType = 'rules';
                fileHint = 'Правила маршрутизации (раздельное туннелирование)';
            } else if (lowerUrl.includes('sub') || lowerUrl.includes('subscription')) {
                fileType = 'sub';
                fileHint = 'Подписка (список серверов)';
            } else if (lowerUrl.endsWith('.json')) {
                fileType = 'json';
                fileHint = 'JSON-конфигурация';
            } else if (lowerUrl.includes('vmess') || lowerUrl.includes('vless') || lowerUrl.includes('trojan')) {
                fileType = 'single';
                fileHint = 'Одиночный протокол';
            }
            
            document.getElementById('fileType').innerText = 
                fileType === 'rules' ? '📋 Правила маршрутизации' :
                fileType === 'sub' ? '📡 Подписка' :
                '⚙️ Конфигурация';
            document.getElementById('fileHint').innerText = fileHint;
            document.getElementById('directLink').innerText = targetUrl;
            document.getElementById('directLink').href = targetUrl;
            
            // Генерация правильной v2raytun-схемы
            let v2raytunUrl = '';
            if (fileType === 'rules') {
                v2raytunUrl = `v2raytun://import/rules?url=${encodeURIComponent(targetUrl)}`;
            } else if (fileType === 'sub') {
                v2raytunUrl = `v2raytun://import/sub?url=${encodeURIComponent(targetUrl)}`;
            } else {
                // для одиночных конфигов и json
                v2raytunUrl = `v2raytun://import/config?url=${encodeURIComponent(targetUrl)}`;
            }
            
            // Кнопка импорта
            const importBtn = document.getElementById('importBtn');
            importBtn.onclick = () => {
                window.location.href = v2raytunUrl;
                document.getElementById('statusMsg').innerHTML = '✅ Открываем v2rayTun...<br>Если приложение не открылось, проверьте установку.';
                setTimeout(() => {
                    document.getElementById('statusMsg').innerHTML = '🔄 Если ничего не произошло, нажмите кнопку ещё раз или скопируйте ссылку вручную.';
                }, 2000);
            };
            
            // Копирование ссылки
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.onclick = async () => {
                try {
                    await navigator.clipboard.writeText(v2raytunUrl);
                    document.getElementById('statusMsg').innerHTML = '✅ Ссылка скопирована! Откройте v2rayTun и используйте "Импорт из буфера".';
                    setTimeout(() => {
                        document.getElementById('statusMsg').innerHTML = '💡 Нажмите кнопку выше, чтобы открыть в приложении';
                    }, 3000);
                } catch(e) {
                    document.getElementById('statusMsg').innerHTML = '❌ Не удалось скопировать, выделите ссылку вручную.';
                }
            };
            
            // Прямая ссылка на файл тоже должна быть видна
            document.getElementById('directLink').href = targetUrl;
            
            // Скрыть загрузку и показать интерфейс
            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('infoArea').style.display = 'block';
            
            // Автоматическая попытка открыть приложение через 300ms (для удобства)
            setTimeout(() => {
                try {
                    window.location.href = v2raytunUrl;
                } catch(e) {}
            }, 400);
        }
        
        // Функция для ручного копирования ссылки на случай, если clipboard не сработал
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
